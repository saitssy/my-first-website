<!DOCTYPE html>
<html>

<head>
    <title>Sait Cloud Project</title>

    <style>
      html {
    scroll-behavior: smooth;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 40px 0;
}

.nav {
    position: sticky;
    top: 20px;
    width: 45%;
    margin: 0 auto 30px auto;
    background-color: rgba(11, 18, 32, 0.9);
    border: 1px solid #38bdf8;
    border-radius: 14px;
    padding: 15px;
    z-index: 1000;
}

.nav a {
    color: #38bdf8;
    text-decoration: none;
    margin: 0 14px;
    font-weight: bold;
    transition: 0.3s;
}

.nav a:hover {
    color: white;
    text-shadow: 0 0 10px #38bdf8;
}

.box {
    background-color: rgba(15, 23, 42, 0.75);
    border: 1px solid #38bdf8;
    padding: 35px;
    margin: 22px auto;
    width: 45%;
    border-radius: 18px;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.55);
}

h1 {
    color: #38bdf8;
    font-size: 42px;
}

h2 {
    color: #38bdf8;
    font-size: 30px;
}

p {
    line-height: 1.6;
}

a {
    color: #38bdf8;
}

.box a {
    display: inline-block;
    margin: 10px;
    padding: 9px 16px;
    border: 1px solid #38bdf8;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
}

.box a:hover {
    background-color: #38bdf8;
    color: #020617;
}

@media (max-width: 800px) {
    .nav,
    .box {
        width: 85%;
    }

    .nav a {
        display: inline-block;
        margin: 8px;
    }

    h1 {
        font-size: 30px;
    }
} 
    </style>

</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
</div>

<div class="box">
    <h1>Sait - Cloud & DevOps Learner</h1>
    <p>This website is running on AWS EC2</p>
</div>

</body>
</html>
